<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome – John Maguire</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500&family=Barlow:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --red: #cc1010;
    --red-bright: #e81c1c;
    --red-dim: #8a0d0d;
    --white: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* Background — pure black with very subtle red vignette */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 50%, #1a0000 0%, #000000 70%);
    z-index: 0;
  }

  /* Subtle noise grain overlay */
  .grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 150px 150px;
  }

  /* Horizontal rule lines */
  .rule-top, .rule-bottom {
    position: fixed; left: 60px; right: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--red) 20%, var(--red) 80%, transparent);
    z-index: 2;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
  }
  .rule-top { top: 48px; animation-delay: 0.4s; }
  .rule-bottom { bottom: 48px; animation-delay: 0.4s; }

  /* SVG arc motif – left side */
  .arcs-left {
    position: fixed; left: -30px; top: 50%;
    transform: translateY(-50%);
    width: 220px; height: 300px;
    opacity: 0;
    animation: slideInLeft 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    z-index: 2;
  }

  /* SVG arc motif – right side (flipped) */
  .arcs-right {
    position: fixed; right: -30px; top: 50%;
    transform: translateY(-50%) scaleX(-1);
    width: 220px; height: 300px;
    opacity: 0;
    animation: slideInRight 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    z-index: 2;
  }

  /* Main content */
  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    gap: 0;
  }

  .welcome-block {
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    animation: riseIn 1.1s ease forwards;
    padding: 32px 0;
  }

  .welcome-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: clamp(0.7rem, 1.3vw, 1rem);
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: rgba(204,16,16,0.55);
    margin-bottom: 10px;
  }

  .welcome-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 400;
    font-size: clamp(2.8rem, 6vw, 5.5rem);
    color: var(--red-bright);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
  }

  .welcome-name--large {
    font-size: clamp(3.8rem, 8.5vw, 8rem);
    font-weight: 500;
    letter-spacing: 0.06em;
  }

  .divider-line {
    width: 320px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red-dim) 20%, var(--red-dim) 80%, transparent);
    opacity: 0;
    animation: fadeIn 0.8s ease forwards;
    animation-delay: 1.0s;
  }

  /* Flexi logo – top left */
  .flexi-logo {
    position: fixed;
    top: 28px; left: 28px;
    width: 160px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
    animation-delay: 0.6s;
    z-index: 20;
  }

  /* Corner ornament marks */
  .corner {
    position: fixed;
    width: 32px; height: 32px;
    border-color: var(--red);
    border-style: solid;
    opacity: 0;
    animation: fadeIn 1s ease forwards;
    animation-delay: 0.5s;
    z-index: 3;
  }
  .corner-tl { top: 36px; left: 36px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 36px; right: 36px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 36px; left: 36px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 36px; right: 36px; border-width: 0 1px 1px 0; }

  /* Keyframes */
  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateY(-50%) translateX(-40px); }
    to   { opacity: 0.6; transform: translateY(-50%) translateX(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateY(-50%) scaleX(-1) translateX(-40px); }
    to   { opacity: 0.6; transform: translateY(-50%) scaleX(-1) translateX(0); }
  }

  /* Soft ambient pulse on gold */
  @keyframes goldPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.75; }
  }
  .arcs-left, .arcs-right {
    animation-fill-mode: forwards;
  }
  .arcs-left.pulsing, .arcs-right.pulsing {
    animation: goldPulse 6s ease-in-out infinite;
  }
</style>
</head>
