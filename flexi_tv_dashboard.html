<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome – John Maguire</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* Logo – top right, small */
  .logo {
    position: fixed;
    top: 30px;
    right: 40px;
    width: 90px;
    z-index: 10;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  /* Corner brackets */
  .corner {
    position: fixed;
    width: 28px; height: 28px;
    border: 1px solid #aa0e0e;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
    z-index: 5;
  }
  .tl { top: 22px;    left: 22px;    border-right: none; border-bottom: none; }
  .tr { top: 22px;    right: 22px;   border-left: none;  border-bottom: none; }
  .bl { bottom: 22px; left: 22px;    border-right: none; border-top: none; }
  .br { bottom: 22px; right: 22px;   border-left: none;  border-top: none; }

  /* Top & bottom rules */
  .rule {
    position: fixed;
    left: 55px; right: 55px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #aa0e0e 15%, #aa0e0e 85%, transparent);
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
    z-index: 5;
  }
  .rule-top    { top: 22px; }
  .rule-bottom { bottom: 22px; }

  /* Centre stage – truly centred */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Each welcome block */
  .block {
    text-align: center;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
  }
  .block-1 { animation-delay: 0.7s; }
  .block-2 { animation-delay: 1.2s; }

  .label {
    font-weight: 200;
    font-size: 1.2vw;
    letter-spacing: 0.6em;
    text-transform: uppercase;
    color: rgba(200, 20, 20, 0.55);
    margin-bottom: 0.5vw;
  }

  .board-text {
    font-weight: 400;
    font-size: 5.5vw;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #dd1515;
    line-height: 1;
  }

  /* Divider between the two blocks */
  .divider {
    width: 30vw;
    height: 1px;
    margin: 4vh 0;
    background: linear-gradient(90deg, transparent, #6e0808 20%, #6e0808 80%, transparent);
    opacity: 0;
    animation: fadeUp 0.8s ease 1s forwards;
  }

  .name-text {
    font-weight: 500;
    font-size: 10vw;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #e81818;
    line-height: 1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Logo top right – small -->

  </svg>
</div>

<!-- Corner brackets -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Rules -->
<div class="rule rule-top"></div>
<div class="rule rule-bottom"></div>

<!-- Centred content -->
<div class="stage">

  <div class="block block-1">
    <div class="label">Welcome</div>
    <div class="board-text">Board of Directors</div>
  </div>

  <div class="divider"></div>

  <div class="block block-2">
    <div class="label">Welcome</div>
    <div class="name-text">John Maguire</div>
  </div>

</div>

</body>
</html>
